version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: webapp/backend/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./results:/app/results
      - ./data:/app/data
    environment:
      - TF_ENABLE_ONEDNN_OPTS=0
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: webapp/frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
